name: Ping Supabase to Prevent Pausing

on:
  schedule:
    - cron: '0 9 * * 1,4' # Runs at 9:00 AM UTC every Monday and Thursday
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase via PostgREST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          response=$(curl -s \
            -X GET "${{SUPABASE_URL}}/rest/v1/events?limit=1" \
            -H "apikey: ${{SUPABASE_ANON_KEY}}" \
            -H "Authorization: Bearer ${{SUPABASE_ANON_KEY}}")
          if [ -z "$response" ]; then
            echo "Error: empty response when pinging." >&2
            exit 1
          fi
          echo "Successful ping: $response."
